site_name: pi-portal
site_description: Web UI for managing dot-pi standalone agents
site_url: https://PlebeiusGaragicus.github.io/pi-portal/
repo_url: https://github.com/PlebeiusGaragicus/pi-portal
repo_name: pi-portal

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Usage: usage.md
  - Configuration: configuration.md
  - API: api.md
  - Security: security.md
